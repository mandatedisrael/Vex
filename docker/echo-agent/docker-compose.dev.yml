# Echo Agent — local dev stack with persistent storage.
# Brings up Postgres+pgvector on 5777 and the EmbeddingGemma model in
# Docker Model Runner (port 12434, fixed by the runner — not configurable).
#
# Requires: Docker Engine >=4.40, Compose >=2.38.1, Model Runner active.
# (`docker model status` should be green; on Linux/WSL2 without Docker Desktop
# enable the standalone model-runner project.)
#
# The agent CLI runs on the host (outside compose) and reads:
#   EMBEDDING_BASE_URL=http://localhost:12434/engines/llama.cpp/v1
#   EMBEDDING_MODEL=ai/embeddinggemma:300M-Q8_0
#   ECHO_AGENT_DB_URL=postgresql://echo_agent:echo_agent@localhost:5777/echo_agent
#
# `models:` and `services` use Compose default container naming so multiple
# stacks can coexist on the same machine without colliding container_name.

models:
  embeddings:
    # Pinned tag, NOT :latest. 300M Q8_0 quantization, llama.cpp engine, 768 dim.
    # Distributed under the Gemma Terms of Use — see https://ai.google.dev/gemma/terms.
    model: ai/embeddinggemma:300M-Q8_0

services:
  echo-agent-db:
    build: ./postgres
    ports: ["5777:5432"]
    environment:
      POSTGRES_DB: echo_agent
      POSTGRES_USER: echo_agent
      POSTGRES_PASSWORD: echo_agent
    volumes:
      - echo-agent-db-data:/var/lib/postgresql/data
    # Dummy puller carrier — Postgres does not actually use the embedding model.
    # Per https://docs.docker.com/reference/compose-file/models/ a top-level
    # `models:` block alone does NOT trigger Compose to pull/run the model;
    # at least one service must explicitly grant itself access via `models:`.
    # Without this entry, `make e2e-up` on a clean machine would not pull
    # ai/embeddinggemma:300M-Q8_0 into Docker Model Runner. Postgres ignores
    # the auto-injected EMBEDDINGS_URL/EMBEDDINGS_MODEL env vars.
    models:
      - embeddings
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U echo_agent -d echo_agent"]
      interval: 3s
      timeout: 2s
      retries: 10

volumes:
  echo-agent-db-data:
