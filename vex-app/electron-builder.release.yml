# Vex — PRODUCTION / RELEASE electron-builder profile.
#
# Signed + notarized public releases published to GitHub Releases and consumed
# by electron-updater. This is intentionally SEPARATE from the default
# `electron-builder.yml` (internal unsigned dev/test packaging) so the dev flow
# — `pnpm --dir vex-app make` / `package` — keeps working untouched. Passing
# `--config electron-builder.release.yml` REPLACES the default config, so this
# file is self-contained.
#
# Release matrix (owner-agreed 2026-07-05, see vex-expand/dystrybucja-macos-github.md
# §"Ustalenia platformowe"): macOS arm64 + x64 (Developer ID + notarization,
# two separate per-arch artifacts) and Linux x64 (AppImage + deb, unsigned).
# Windows is a deliberate SECOND release (needs an OV/EV cert) and is absent here.
#
# Secrets are read from the CI ENVIRONMENT ONLY — never stored in this repo:
#   CSC_LINK                     Developer ID Application cert (.p12, base64)
#   CSC_KEY_PASSWORD             password protecting that .p12
#   APPLE_ID                     Apple ID email (notarytool)
#   APPLE_APP_SPECIFIC_PASSWORD  app-specific password (notarytool)
#   APPLE_TEAM_ID                10-char Apple Team ID (notarytool)
#   GH_TOKEN                     GitHub Releases upload (CI: secrets.GITHUB_TOKEN)

# appId: permanent app-identity / auto-updater / userData contract. Locked to
# ai.projectvex.app (reverse-DNS of app.projectvex.ai) by owner decision before
# the first tag. MUST NOT change after the first published release — a changed
# appId breaks auto-update for every installed client and orphans their userData.
appId: ai.projectvex.app
productName: Vex

# Versioned + arch-unique names. Versioned (NOT versionless) is deliberate:
# electron-updater's differential/blockmap download and on-disk cache key off
# per-version file names, so reusing a fixed name across releases can corrupt
# update caching. The landing page therefore resolves the newest asset via the
# GitHub "latest release" page/API (see .github/workflows/release.yml header),
# not a fixed `/releases/latest/download/<name>` link.
artifactName: ${productName}-${version}-${os}-${arch}.${ext}

# Production MUST be signed. Fails the build if a signing identity is missing on
# a code-signed platform (macOS here) — prevents an accidental unsigned release.
# No-op for Linux targets (AppImage/deb are not code-signed).
forceCodeSigning: true

asar: true
electronUpdaterCompatibility: ">=2.16"
# Flips Electron fuses (RunAsNode off, ASAR integrity on, ...) BEFORE codesign.
afterPack: ./build/afterPack.mjs

directories:
  output: dist-electron
  buildResources: build

files:
  - dist/main/**
  - dist/preload/**
  - dist/renderer/**
  - package.json
  # Exclude sourcemaps from packaged artifacts (security + size).
  - "!dist/**/*.map"
  - "!dist/**/*.tsbuildinfo"

extraResources:
  - from: resources/compose
    to: compose
    filter: ["**/*"]
  - from: resources/migrations
    to: migrations
    filter: ["**/*.sql"]

mac:
  category: public.app-category.finance
  target:
    - target: dmg # human-facing installer UX
      arch: [arm64, x64]
    - target: zip # REQUIRED by electron-updater on macOS (dmg alone is not enough)
      arch: [arm64, x64]
  icon: build/icon.icns
  hardenedRuntime: true # required for notarization
  gatekeeperAssess: false
  # Reuses the repo's deliberately security-hardened entitlements (same files the
  # dev profile uses): allow-jit (V8) + network.client are ON;
  # allow-unsigned-executable-memory and disable-library-validation stay OFF.
  # Production deps are pure-JS (viem/pg/solana — no native modules per the owner
  # spec), so the looser electron-builder default entitlements set is not needed,
  # and keeping it tight is the right posture for a self-custodial wallet.
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  # electron-builder 26 takes `notarize` as a BOOLEAN and runs notarytool using
  # APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID from the ENVIRONMENT
  # (there is no config `teamId` in this version). NOTE: if those env vars are
  # absent it SKIPS notarization with only a warning — the release workflow
  # fails fast beforehand so an un-notarized build is never published.
  notarize: true

linux:
  category: Finance
  # TODO(owner): confirm a REAL contact address you control — this string is
  # embedded in every published .deb. Do NOT use a personal email.
  maintainer: Vex Foundation <contact@projectvex.ai>
  vendor: Vex Foundation
  # Single high-res PNG — electron-builder fans out to hicolor sizes for
  # AppImage and deb packaging.
  icon: build/icon.png
  target:
    - target: AppImage # broad direct download + auto-update via latest-linux.yml
      arch: [x64]
    - target: deb # Debian/Ubuntu package-manager install
      arch: [x64]

publish:
  provider: github
  owner: Vex-Foundation
  repo: Vex
  # Draft = mandatory human review gate before users see the release: confirm the
  # signed + notarized artifacts and latest-mac.yml / latest-linux.yml uploaded,
  # add release notes, then click "Publish release" in GitHub. Users' updaters
  # only see PUBLISHED releases, so a draft is invisible until you publish it.
  # Flip to `release` if you want fully zero-touch auto-publish on tag.
  releaseType: draft
